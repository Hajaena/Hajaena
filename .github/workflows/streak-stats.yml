name: Generate Streak Stats

on:
  schedule:
    - cron: "0 3 * * *"  # tous les jours à 03h00 UTC
  push:
    paths:
      - ".github/workflows/streak-stats.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate streak stats
        uses: DenverCoder1/github-readme-streak-stats@main
        with:
          options: user=Hajaena&theme=dark&hide_border=true&background=00000000
          path: profile/streak.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit streak stats
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/streak.svg
          git commit -m "chore: update streak stats" || exit 0
          git push