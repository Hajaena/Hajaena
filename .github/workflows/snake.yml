name: Generate Snake Animation

on:
  schedule:
    - cron: "0 3 * * *"  # tous les jours à 03h00 UTC
  push:
    branches:
      - main
  workflow_dispatch:  # permet de lancer manuellement depuis l'onglet Actions

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Generate snake animation
        uses: Platane/snk@v3
        with:
          github_user_name: Hajaena
          outputs: |
            dist/github-contribution-grid-snake.gif?color_snake=%23009fe3&color_dots=%23161b22,%230e4429,%23006d32,%2326a641,%2339d353

      - name: Push output to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}